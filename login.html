<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Neil Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async></script>
<link rel="stylesheet" href="/css/tokens.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/login.css">
</head>
<body class="login-body">

<div class="login-card">
  <img class="login-logo" src="https://neil.app/lovable-uploads/92a600f8-dafb-431d-9240-1c537f06e250.png" alt="Neil">
  <h1 class="login-title">Guide de démonstration</h1>
  <p class="login-sub">Connectez-vous avec votre compte Neil pour accéder au guide de démo prospect.</p>
  <div class="login-domain">🔒 Réservé aux comptes @neil.app</div>

  <div id="g_id_onload"
       data-client_id="{{GOOGLE_CLIENT_ID}}"
       data-callback="handleCredentialResponse"
       data-auto_prompt="false">
  </div>
  <div class="g_id_signin"
       data-type="standard"
       data-shape="rectangular"
       data-theme="outline"
       data-text="signin_with"
       data-size="large"
       data-logo_alignment="left"
       data-locale="fr">
  </div>

  <div class="login-error" id="loginError"></div>

  <div class="login-footer">Neil ERP — usage interne uniquement</div>
</div>

<script>
function handleCredentialResponse(response) {
  const errorEl = document.getElementById('loginError');
  errorEl.classList.remove('visible');

  fetch('/auth/google', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ credential: response.credential })
  })
  .then(r => r.json().then(data => ({ status: r.status, data })))
  .then(({ status, data }) => {
    if (data.ok) {
      window.location.href = '/';
    } else {
      errorEl.textContent = data.error || 'Accès refusé';
      errorEl.classList.add('visible');
    }
  })
  .catch(() => {
    errorEl.textContent = 'Impossible de contacter le serveur';
    errorEl.classList.add('visible');
  });
}
</script>

</body>
</html>
